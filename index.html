<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>پنل کاربری دستیار مشاور</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #1f2937);
            padding-bottom: 80px;
        }
        .input-field {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            border: 1px solid var(--tg-theme-hint-color, #d1d5db);
        }
        .input-field:focus {
            border-color: var(--tg-theme-button-color, #3b82f6);
            outline: none;
        }
        .tab-btn {
            white-space: nowrap;
            padding: 0.5rem 1rem;
            color: var(--tg-theme-hint-color, #6b7280);
        }
        .tab-btn.active {
            border-bottom: 2px solid var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-color, #3b82f6);
            font-weight: bold;
        }
        .hidden-tab { display: none; }
        
        /* استایل دکمه مجازی برای مرورگر */
        #fakeMainButton {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background-color: #3b82f6;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold" id="appTitle">در حال بارگذاری...</h1>
            <p class="text-sm opacity-70 mt-1" id="studentInfo"></p>
        </div>

        <div class="flex overflow-x-auto border-b border-gray-300 mb-6 pb-2 space-x-4 space-x-reverse text-sm" id="tabsContainer">
            <!-- تب‌های دانش‌آموز -->
            <button class="tab-btn active student-only" onclick="switchTab('report')">گزارش‌کار</button>
            <button class="tab-btn student-only" onclick="switchTab('exam')">آزمون</button>
            <button class="tab-btn student-only" onclick="switchTab('message')">پیام به مشاور</button>
            <button class="tab-btn student-only" onclick="switchTab('my_stats')">کارنامه کل</button>
            <button class="tab-btn student-only" onclick="switchTab('sub_status')">وضعیت اشتراک</button>
            
            <!-- تب‌های مشاور -->
            <button class="tab-btn advisor-only hidden-tab" onclick="switchTab('send_task')">ارسال برنامه</button>
            <button class="tab-btn advisor-only hidden-tab" onclick="switchTab('advisor_data')">لیست دانش‌آموزان</button>
            <button class="tab-btn advisor-only hidden-tab" onclick="switchTab('broadcast')">پیام همگانی</button>
            <button class="tab-btn advisor-only hidden-tab" onclick="switchTab('leaderboard')">رتبه‌بندی</button>
            <button class="tab-btn advisor-only hidden-tab" onclick="switchTab('finance')">تمدید اشتراک</button>
        </div>

        <!-- 1. فرم گزارش کار دانش‌آموز (شامل تیک‌های مشاور + افزودن دستی) -->
        <form id="form_report" class="space-y-4 tab-content">
            <!-- بخش برنامه‌های تعیین شده توسط مشاور -->
            <div id="advisorTasksContainer" class="space-y-3 mb-6">
                <!-- تسک‌ها اینجا اضافه میشن -->
            </div>

            <!-- بخش افزودن دروس دستی -->
            <div id="studentSubjectsContainer" class="space-y-4 border-t-2 border-gray-200 pt-4">
                <!-- فرم‌های درسی اضافه شده توسط دانش‌آموز اینجا قرار می‌گیرند -->
            </div>

            <button type="button" onclick="addStudentSubjectForm()" class="w-full py-2 border-2 border-dashed border-green-500 text-green-600 font-bold rounded-lg mt-2">
                ➕ افزودن درس اضافی (خارج از برنامه)
            </button>

            <div class="space-y-1 mt-6">
                <label class="block text-sm font-semibold">وضعیت انرژی امروز</label>
                <select id="mood" class="input-field w-full p-2 rounded-lg">
                    <option value="عالی">عالی</option>
                    <option value="خوب" selected>خوب</option>
                    <option value="متوسط">متوسط</option>
                    <option value="خسته">خسته</option>
                </select>
            </div>
        </form>

        <!-- سایر تب‌های دانش‌آموز -->
        <form id="form_exam" class="space-y-4 tab-content hidden-tab">
            <div class="space-y-1">
                <label class="block text-sm font-semibold">نام آزمون / درس</label>
                <input type="text" id="courseName" class="input-field w-full p-2 rounded-lg" placeholder="مثلاً ریاضی جامع">
            </div>
            <div class="space-y-1">
                <label class="block text-sm font-semibold">درصد یا نمره</label>
                <input type="number" id="examPercent" class="input-field w-full p-2 rounded-lg" placeholder="درصد وارد شود">
            </div>
        </form>

        <form id="form_message" class="space-y-4 tab-content hidden-tab">
            <div class="space-y-1">
                <label class="block text-sm font-semibold">متن پیام</label>
                <textarea id="studentMessage" rows="5" class="input-field w-full p-2 rounded-lg resize-none" placeholder="سوال یا مشکل خود را مطرح کنید..."></textarea>
            </div>
        </form>

        <div id="form_my_stats" class="tab-content hidden-tab text-center text-sm">برای دریافت کارنامه آماری تایید کنید.</div>
        <div id="form_sub_status" class="tab-content hidden-tab text-center text-sm">برای بررسی وضعیت قرارداد تایید کنید.</div>

        <!-- 2. فرم ارسال برنامه مشاور -->
        <form id="form_send_task" class="space-y-4 tab-content hidden-tab">
            <div class="space-y-1 mb-4">
                <label class="block text-sm font-semibold">انتخاب دانش‌آموز</label>
                <select id="targetStudentId" class="input-field w-full p-2 rounded-lg" onchange="updateAdvisorCurriculum()">
                    <!-- لیست دانش‌آموزان توسط ربات پر می‌شود -->
                </select>
            </div>

            <div id="advisorSubjectsContainer" class="space-y-4">
                <!-- فرم‌های درسی مشاور اینجا قرار می‌گیرند -->
            </div>

            <button type="button" onclick="addAdvisorSubjectForm()" class="w-full py-2 border-2 border-dashed border-green-500 text-green-600 font-bold rounded-lg mt-2">
                ➕ افزودن درس به برنامه
            </button>
            
            <div class="space-y-1 mt-4">
                <label class="block text-sm font-semibold">توضیحات اضافه (اختیاری)</label>
                <textarea id="taskNotes" rows="2" class="input-field w-full p-2 rounded-lg resize-none" placeholder="نکته‌ای اگر هست بنویسید..."></textarea>
            </div>
        </form>

        <!-- سایر تب‌های مشاور -->
        <div id="form_advisor_data" class="tab-content hidden-tab text-center text-sm">
            لیست دانش‌آموزان را مستقیماً در چت تلگرام دریافت خواهید کرد. تایید کنید.
        </div>

        <form id="form_broadcast" class="space-y-4 tab-content hidden-tab">
            <div class="space-y-1">
                <label class="block text-sm font-semibold">پیام همگانی</label>
                <textarea id="broadcastText" rows="5" class="input-field w-full p-2 rounded-lg resize-none" placeholder="ارسال برای تمامی دانش‌آموزان..."></textarea>
            </div>
        </form>

        <div id="form_leaderboard" class="tab-content hidden-tab text-center text-sm">برای مشاهده رتبه‌بندی هفته تایید کنید.</div>

        <form id="form_finance" class="space-y-4 tab-content hidden-tab">
            <div class="space-y-1">
                <label class="block text-sm font-semibold">شناسه دانش‌آموز</label>
                <input type="number" id="financeStudentId" class="input-field w-full p-2 rounded-lg" placeholder="کد عددی">
                <p class="text-xs opacity-70 text-gray-600 mt-2">با تایید شما، ۳۰ روز به اشتراک اضافه می‌شود.</p>
            </div>
        </form>
    </div>

    <!-- دکمه تست در محیط مرورگر -->
    <div id="fakeMainButton" style="display: none;" onclick="triggerMainButton()">ثبت اطلاعات (تست مرورگر)</div>

    <script>
        const tg = window.Telegram.WebApp;
        let isTgAvailable = false;
        
        // سیستم تشخیص بسیار دقیق تلگرام موبایل/دسکتاپ
        if (tg.initData !== "" || (tg.platform && tg.platform !== "unknown")) {
            isTgAvailable = true;
            tg.expand();
        } else {
            // شبیه‌سازی برای مرورگر خارج از تلگرام
            console.log("Running outside Telegram. Mocking functionality...");
            document.getElementById('fakeMainButton').style.display = 'block';
            tg.sendData = (data) => { alert("داده‌ها آماده ارسال به ربات هستند:\n\n" + data); };
            tg.showAlert = (msg) => alert(msg);
            tg.MainButton = { 
                show: () => { document.getElementById('fakeMainButton').style.display = 'block'; }, 
                enable: () => {}, 
                setText: function(t) { document.getElementById('fakeMainButton').innerText = t; }, 
                text: "", color: "", textColor: "" 
            };
            tg.themeParams = {};
        }
        
        let currentRole = 'student';
        let currentTab = 'report';
        let studentField = 'تجربی';
        let advisorStudentsList = []; // برای ذخیره لیست دانش‌آموزان مشاور
        let studentToDos = []; // برای ذخیره برنامه‌های تعیین شده برای دانش‌آموز

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'advisor') {
            currentRole = 'advisor';
            if (urlParams.get('st_data')) {
                const rawData = decodeURIComponent(urlParams.get('st_data')).split(',');
                advisorStudentsList = rawData.map(item => {
                    const parts = item.split('|');
                    return { id: parts[0], name: parts[1], field: parts[2] };
                });
            }
        } else {
            if (urlParams.get('field')) studentField = decodeURIComponent(urlParams.get('field'));
            if (urlParams.get('todos')) {
                const rawTodos = decodeURIComponent(urlParams.get('todos')).split(',');
                if(rawTodos[0] !== "") {
                    studentToDos = rawTodos.map(item => {
                        const p = item.split('~'); // id~task_text~status
                        const data = p[1].split('|'); // subject|chapter|hours|tests
                        return { id: p[0], subject: data[0], chapter: data[1], hours: data[2], tests: data[3], status: p[2] };
                    });
                }
            }
        }

        const curriculumData = {
            "تجربی": {
                "زیست‌شناسی": ["فصل ۱", "فصل ۲", "فصل ۳", "فصل ۴", "فصل ۵", "مباحث ترکیبی", "سایر"],
                "شیمی": ["فصل ۱", "فصل ۲", "فصل ۳", "مباحث ترکیبی", "سایر"],
                "فیزیک": ["فصل ۱", "فصل ۲", "فصل ۳", "فصل ۴", "سایر"],
                "ریاضی": ["مجموعه و الگو", "مثلثات", "توان‌های گویا", "معادله‌ها", "سایر"],
                "زمین‌شناسی": ["آفرینش کیهان", "منابع معدنی", "سایر"]
            },
            "ریاضی": {
                "حسابان": ["جبر و معادله", "تابع", "مثلثات", "حد و پیوستگی", "سایر"],
                "هندسه": ["ماتریس", "مقاطع مخروطی", "بردارها", "سایر"],
                "گسسته": ["منطق ریاضی", "گراف", "ترکیبیات", "سایر"],
                "فیزیک": ["حرکت‌شناسی", "دینامیک", "نوسان و موج", "سایر"],
                "شیمی": ["ساختار اتم", "ترمودینامیک", "سایر"]
            },
            "انسانی": {
                "علوم و فنون ادبی": ["مبانی تحلیل متن", "موسیقی شعر", "سایر"],
                "عربی تخصصی": ["معرفت و نکره", "اعراب", "سایر"],
                "جامعه‌شناسی": ["جهان اجتماعی", "فرهنگ", "سایر"],
                "فلسفه و منطق": ["مفهوم و مصداق", "اقسام ذاتی", "سایر"],
                "ریاضی و آمار": ["عبارت‌ها", "معادله درجه دوم", "سایر"],
                "تاریخ و جغرافیا": ["تاریخ ایران", "جغرافیای جمعیت", "سایر"]
            }
        };

        function initApp() {
            if (currentRole === 'advisor') {
                document.getElementById('appTitle').innerText = "پنل مدیریت مشاور";
                currentTab = 'send_task';
                document.querySelectorAll('.student-only').forEach(el => el.classList.add('hidden-tab'));
                document.querySelectorAll('.advisor-only').forEach(el => el.classList.remove('hidden-tab'));
                
                // پر کردن لیست دانش‌آموزان
                const stSelect = document.getElementById('targetStudentId');
                advisorStudentsList.forEach(st => {
                    const opt = document.createElement('option');
                    opt.value = st.id;
                    opt.innerText = `${st.name} (${st.field})`;
                    opt.dataset.field = st.field;
                    stSelect.appendChild(opt);
                });
                
                addAdvisorSubjectForm();
            } else {
                document.getElementById('appTitle').innerText = "پنل دانش‌آموز";
                document.getElementById('studentInfo').innerText = `رشته تحصیلی: ${studentField}`;
                document.querySelectorAll('.advisor-only').forEach(el => el.classList.add('hidden-tab'));
                document.querySelectorAll('.student-only').forEach(el => el.classList.remove('hidden-tab'));
                
                // پر کردن چک‌باکس‌های برنامه‌های مشاور
                renderStudentToDos();
            }
            switchTab(currentTab);
        }

        function renderStudentToDos() {
            const container = document.getElementById('advisorTasksContainer');
            container.innerHTML = '';
            
            if (studentToDos.length > 0) {
                const title = document.createElement('h3');
                title.className = "text-sm font-bold text-blue-600 border-b pb-1";
                title.innerText = "📋 برنامه‌های امروز از طرف مشاور:";
                container.appendChild(title);
                
                studentToDos.forEach((todo, index) => {
                    const isChecked = todo.status === '1' ? 'checked' : '';
                    const div = document.createElement('div');
                    div.className = "flex items-center p-3 bg-blue-50 rounded-lg border border-blue-100";
                    div.innerHTML = `
                        <input type="checkbox" id="todo_${todo.id}" class="w-5 h-5 text-blue-600 rounded mr-3" ${isChecked}>
                        <div class="mr-3">
                            <label for="todo_${todo.id}" class="font-bold text-sm block cursor-pointer">${todo.subject} (${todo.chapter})</label>
                            <span class="text-xs text-gray-600">${todo.hours} ساعت مطالعه | ${todo.tests} تست</span>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<p class="text-xs text-gray-500 text-center py-2">برنامه‌ای از سمت مشاور برای امروز تعیین نشده است.</p>';
            }
        }

        // توابع ایجاد فرم پویا برای دانش‌آموز (دستی)
        function addStudentSubjectForm() {
            const container = document.getElementById('studentSubjectsContainer');
            const index = container.children.length;
            const field = studentField;
            
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-50 rounded-lg border border-gray-200 relative";
            div.id = `st_subject_group_${index}`;
            
            const subjSelectHtml = getSubjectsOptionsHtml(field);
            
            div.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 left-2 text-red-500 font-bold text-lg leading-none">&times;</button>
                <div class="space-y-1 mb-2">
                    <label class="block text-xs font-semibold">درس</label>
                    <select class="st-subject-select input-field w-full p-2 rounded-lg text-sm" onchange="updateRowChapters(this, '${field}')">
                        ${subjSelectHtml}
                    </select>
                </div>
                <div class="space-y-1 mb-2">
                    <label class="block text-xs font-semibold">مبحث</label>
                    <select class="st-chapter-select input-field w-full p-2 rounded-lg text-sm"></select>
                </div>
                <div class="flex space-x-2 space-x-reverse">
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-semibold">ساعت</label>
                        <input type="number" step="0.25" class="st-hours-input input-field w-full p-2 rounded-lg text-center text-sm">
                    </div>
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-semibold">تست</label>
                        <input type="number" class="st-tests-input input-field w-full p-2 rounded-lg text-center text-sm">
                    </div>
                </div>
            `;
            container.appendChild(div);
            updateRowChapters(div.querySelector('.st-subject-select'), field);
        }

        // توابع ایجاد فرم پویا برای مشاور (ارسال برنامه)
        function updateAdvisorCurriculum() {
            document.getElementById('advisorSubjectsContainer').innerHTML = '';
            addAdvisorSubjectForm();
        }

        function addAdvisorSubjectForm() {
            const container = document.getElementById('advisorSubjectsContainer');
            const index = container.children.length;
            
            const stSelect = document.getElementById('targetStudentId');
            if(!stSelect.options.length) return;
            
            const selectedOption = stSelect.options[stSelect.selectedIndex];
            const field = selectedOption.dataset.field || "تجربی";
            
            const div = document.createElement('div');
            div.className = "p-3 bg-blue-50 rounded-lg border border-blue-200 relative";
            div.id = `adv_subject_group_${index}`;
            
            const subjSelectHtml = getSubjectsOptionsHtml(field);
            
            div.innerHTML = `
                ${index > 0 ? `<button type="button" onclick="this.parentElement.remove()" class="absolute top-2 left-2 text-red-500 font-bold text-lg leading-none">&times;</button>` : ''}
                <div class="space-y-1 mb-2">
                    <label class="block text-xs font-semibold">درس</label>
                    <select class="adv-subject-select input-field w-full p-2 rounded-lg text-sm" onchange="updateRowChapters(this, '${field}')">
                        ${subjSelectHtml}
                    </select>
                </div>
                <div class="space-y-1 mb-2">
                    <label class="block text-xs font-semibold">مبحث</label>
                    <select class="adv-chapter-select input-field w-full p-2 rounded-lg text-sm"></select>
                </div>
                <div class="flex space-x-2 space-x-reverse">
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-semibold">ساعت تعیین شده</label>
                        <input type="number" step="0.25" class="adv-hours-input input-field w-full p-2 rounded-lg text-center text-sm" value="1">
                    </div>
                    <div class="w-1/2 space-y-1">
                        <label class="block text-xs font-semibold">تست تعیین شده</label>
                        <input type="number" class="adv-tests-input input-field w-full p-2 rounded-lg text-center text-sm" value="20">
                    </div>
                </div>
            `;
            container.appendChild(div);
            updateRowChapters(div.querySelector('.adv-subject-select'), field);
        }

        function getSubjectsOptionsHtml(field) {
            const subjects = curriculumData[field] || curriculumData["تجربی"];
            let html = '';
            for (const subj in subjects) {
                html += `<option value="${subj}">${subj}</option>`;
            }
            return html;
        }

        function updateRowChapters(selectElement, field) {
            const subject = selectElement.value;
            const subjects = curriculumData[field] || curriculumData["تجربی"];
            const chapters = subjects[subject] || ["سایر"];
            
            const chapterSelect = selectElement.parentElement.parentElement.querySelector(selectElement.className.includes('adv') ? '.adv-chapter-select' : '.st-chapter-select');
            chapterSelect.innerHTML = '';
            
            chapters.forEach(chap => {
                const opt = document.createElement('option');
                opt.value = chap;
                opt.innerText = chap;
                chapterSelect.appendChild(opt);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-tab'));
            document.getElementById('form_' + tabId).classList.remove('hidden-tab');
            
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            event && event.currentTarget ? event.currentTarget.classList.add('active') : 
                document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');

            updateMainButton();
        }

        function updateMainButton() {
            tg.MainButton.show();
            tg.MainButton.color = tg.themeParams.button_color || "#3b82f6";
            tg.MainButton.textColor = tg.themeParams.button_text_color || "#ffffff";
            tg.MainButton.enable();

            const titles = {
                'report': "ثبت و ارسال گزارش کار",
                'exam': "ثبت نتیجه آزمون",
                'message': "ارسال پیام",
                'my_stats': "مشاهده آمار",
                'sub_status': "استعلام وضعیت قرارداد",
                'send_task': "ثبت و ارسال برنامه",
                'broadcast': "ارسال اطلاعیه",
                'advisor_data': "دریافت لیست",
                'leaderboard': "مشاهده نفرات برتر",
                'finance': "تایید تمدید اشتراک"
            };
            tg.MainButton.setText(titles[currentTab]);
        }

        function triggerMainButton() {
            let payload = { action: currentTab };

            if (currentTab === 'report') {
                const taskUpdates = [];
                let totalHours = 0;
                let totalTests = 0;
                const reportDetails = [];

                // بررسی تیک‌های مشاور
                studentToDos.forEach(todo => {
                    const checkbox = document.getElementById(`todo_${todo.id}`);
                    const isDone = checkbox ? checkbox.checked : false;
                    taskUpdates.push({ id: todo.id, done: isDone });
                    
                    if(isDone) {
                        totalHours += parseFloat(todo.hours);
                        totalTests += parseInt(todo.tests);
                        reportDetails.push({
                            subject: todo.subject, chapter: todo.chapter, 
                            hours: todo.hours, tests: todo.tests, status: "✅ کامل انجام شد"
                        });
                    } else {
                        reportDetails.push({
                            subject: todo.subject, chapter: todo.chapter, 
                            hours: 0, tests: 0, status: "❌ انجام نشد"
                        });
                    }
                });

                // بررسی دروس ثبت شده دستی
                const manualForms = document.getElementById('studentSubjectsContainer').children;
                for (let i = 0; i < manualForms.length; i++) {
                    const form = manualForms[i];
                    const subj = form.querySelector('.st-subject-select').value;
                    const chap = form.querySelector('.st-chapter-select').value;
                    const h = parseFloat(form.querySelector('.st-hours-input').value) || 0;
                    const t = parseInt(form.querySelector('.st-tests-input').value) || 0;
                    
                    if (h > 0 || t > 0) {
                        totalHours += h;
                        totalTests += t;
                        reportDetails.push({
                            subject: subj, chapter: chap, 
                            hours: h, tests: t, status: "➕ ثبت دستی"
                        });
                    }
                }

                if (totalHours === 0 && totalTests === 0 && taskUpdates.filter(t => t.done).length === 0) {
                    return tg.showAlert("لطفاً حداقل یک تسک را تیک بزنید یا یک درس دستی با ساعت مطالعه وارد کنید.");
                }

                payload.task_updates = taskUpdates;
                payload.details = reportDetails;
                payload.total_hours = totalHours;
                payload.total_tests = totalTests;
                payload.mood = document.getElementById('mood').value;
            } 
            else if (currentTab === 'send_task') {
                const stSelect = document.getElementById('targetStudentId');
                if(!stSelect.value) return tg.showAlert("دانش‌آموزی برای ارسال برنامه وجود ندارد.");
                
                payload.student_id = stSelect.value;
                payload.notes = document.getElementById('taskNotes').value;
                
                const details = [];
                const forms = document.getElementById('advisorSubjectsContainer').children;
                for (let i = 0; i < forms.length; i++) {
                    const form = forms[i];
                    const h = parseFloat(form.querySelector('.adv-hours-input').value) || 0;
                    const t = parseInt(form.querySelector('.adv-tests-input').value) || 0;
                    if(h > 0 || t > 0){
                        details.push({
                            subject: form.querySelector('.adv-subject-select').value,
                            chapter: form.querySelector('.adv-chapter-select').value,
                            hours: h,
                            tests: t
                        });
                    }
                }
                if(details.length === 0) return tg.showAlert("لطفاً حداقل یک درس با ساعت و تست وارد کنید.");
                payload.details = details;
            }
            else if (currentTab === 'exam') {
                payload.course = document.getElementById('courseName').value;
                payload.percent = document.getElementById('examPercent').value;
                if(!payload.course || !payload.percent) return tg.showAlert("اطلاعات آزمون ناقص است.");
            }
            else if (currentTab === 'message') {
                payload.text = document.getElementById('studentMessage').value;
                if(!payload.text) return tg.showAlert("متن پیام خالی است.");
            }
            else if (currentTab === 'broadcast') {
                payload.text = document.getElementById('broadcastText').value;
                if(!payload.text) return tg.showAlert("متن پیام خالی است.");
            }
            else if (currentTab === 'finance') {
                payload.student_id = document.getElementById('financeStudentId').value;
                if(!payload.student_id) return tg.showAlert("شناسه وارد نشده است.");
            }

            tg.sendData(JSON.stringify(payload));
        }

        Telegram.WebApp.onEvent('mainButtonClicked', triggerMainButton);

        initApp();
    </script>
</body>
</html>
